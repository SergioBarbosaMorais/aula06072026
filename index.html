<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Maior da Aldeia</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            max-width: 700px;
        }

        h1 {
            font-size: 4em;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 2em;
            color: #facc15;
            margin-bottom: 30px;
        }

        p {
            font-size: 1.3em;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👑 Eu sou o maior da minha aldeia 👑</h1>

        <h2>E não é o David!</h2>

        <p>
            Após anos de estudos, investigações e observações no terreno,
            concluiu-se de forma inequívoca que o título de
            <strong>"Maior da Aldeia"</strong> pertence a mim.
        </p>

        <p>
            Qualquer alegação em contrário deverá ser considerada apenas
            uma opinião sem fundamento científico.
        </p>
    </div>
</body>
</html>
